.between{justify-content:space-between;}

.wrap{flex-wrap:wrap;}
.gap6{gap:6px;} .gap8{gap:8px;} .gap10{gap:10px;} .gap14{gap:14px;} .gap16{gap:16px;}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

.input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-size:14px;width:100%;outline:none;}

button{cursor:pointer;}
.btn{border:none;border-radius:8px;padding:9px 14px;font-weight:600;font-size:13px;transition:transform .12s ease;}

.tab{display:flex;align-items:center;gap:6px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:10px 12px;font-size:14px;font-weight:600;white-space:nowrap;}
.tab.active{color:var(--text);border-bottom-color:var(--energy);}
.ring{border-radius:50%;padding:7px;display:flex;align-items:center;justify-content:center;}
.ring-inner{width:100%;height:100%;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid var(--border);}
.entry{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:8px;}
.stepper{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.stepbtn{width:34px;height:34px;border-radius:8px;border:none;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.stepbtn.plus{background:var(--water);color:#04222F;}
.stepbtn.minus{background:var(--surface);border:1px solid var(--border);color:var(--text);}
.stepbtn:disabled{opacity:.3;cursor:not-allowed;}
.muted{color:var(--muted);}
.empty{color:var(--muted);font-size:12px;text-align:center;padding:24px 0;font-family:'JetBrains Mono',monospace;}
.field-relative{position:relative;}
.suggest-box{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:20;box-shadow:0 8px 20px rgba(0,0,0,.35);}

function addDays(dateStr,n){

let STORAGE_OK = true;
const memoryStore = {};
function storageTest(){
  try{
    const k = '__vc_test__' + Date.now();
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    return ok;
  }catch(e){ return false; }
}
STORAGE_OK = storageTest();

function load(key,fallback){
  if(!STORAGE_OK){
    return Object.prototype.hasOwnProperty.call(memoryStore,key) ? memoryStore[key] : fallback;
  }
  try{ const v = localStorage.getItem(key); return v!==null ? JSON.parse(v) : fallback; }
  catch(e){ STORAGE_OK = false; return Object.prototype.hasOwnProperty.call(memoryStore,key) ? memoryStore[key] : fallback; }
}
function save(key,val){
  memoryStore[key] = val; // keep an in-memory copy so the app still works during this session
  if(!STORAGE_OK) return;
  try{ localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){
    console.error('storage error', e);
    STORAGE_OK = false;
    if(typeof renderApp === 'function') renderApp();
  }
}

function stripAccents(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function normalizeText(s){ return stripAccents(String(s).toLowerCase()).trim(); }

// Extrae la cantidad (y si viene en gramos o en piezas/unidades) y limpia el texto para buscar el alimento
function parseFoodQuery(raw){
  let text = raw;
  let qty = null, unitToken = null;
  const trailing = text.match(/(\d+(?:\.\d+)?)\s*(g|gr|gramos|piezas?|unidades?|pzas?|rebanadas?)?\s*$/i);
  const leading = text.match(/^(\d+(?:\.\d+)?)\s*(g|gr|gramos|piezas?|unidades?|pzas?|rebanadas?)?\s+/i);
  if(trailing && trailing[1]){
    qty = parseFloat(trailing[1]);
    unitToken = trailing[2] ? trailing[2].toLowerCase() : null;
    text = text.slice(0, trailing.index);
  } else if(leading && leading[1]){
    qty = parseFloat(leading[1]);
    unitToken = leading[2] ? leading[2].toLowerCase() : null;
    text = text.slice(leading[0].length);
  }
  text = text
    .replace(/en\s*b[aá]scula/gi,'')
    .replace(/b[aá]scula/gi,'')
    .replace(/peso/gi,'')
    .replace(/,/g,' ')
    .replace(/\s+/g,' ')
    .trim();
  return { name:text, qty, unitToken };
}

// Convierte la cantidad detectada a gramos reales, usando gramos-por-pieza si aplica
function resolveGrams(food, qty, unitToken){
  if(qty==null) return { grams:100, label:'100g (cantidad no especificada)' };
  const isGramUnit = unitToken && /^(g|gr|gramos)$/i.test(unitToken);
  if(isGramUnit || !food || !food.unitGrams){
    return { grams: qty, label: `${qty}g` };
  }
  const grams = qty * food.unitGrams;
  return { grams, label: `${qty} pieza${qty===1?'':'s'} (~${Math.round(grams)}g, ${food.unitGrams}g c/u)` };
}

function singularForms(w){
  const forms = [w];
  if(w.endsWith('es') && w.length>4) forms.push(w.slice(0,-2));
  if(w.endsWith('s') && w.length>3) forms.push(w.slice(0,-1));
  return forms;
}
function scoreMatch(foodName, q){
  const fn = normalizeText(foodName);
  if(!q) return -1;
  const qCandidates = singularForms(q);
  let best = -1;
  qCandidates.forEach(qc=>{
    let s=-1;
    if(fn===qc) s=100;
    else if(fn.startsWith(qc)) s=90;
    else if(fn.includes(qc)) s=80;
    else if(qc.includes(fn)) s=70;
    else {
      const qWords = qc.split(' '), fWords = fn.split(' ');
      const fWordsSing = fWords.flatMap(singularForms);
      const overlap = qWords.filter(w=>w.length>2 && fWordsSing.includes(w)).length;
      if(overlap>0) s = 40+overlap*5;
    }
    if(s>best) best=s;
  });
  return best;
}
function findFood(nameQuery){
  const q = normalizeText(nameQuery);
  if(!q) return null;
  let best=null, bestScore=-1;
  FOOD_DB.forEach(f=>{
    const s = scoreMatch(f.name, q);
    if(s>bestScore){ bestScore=s; best=f; }
  });
  return bestScore>=40 ? best : null;
}
function getSuggestions(raw){
  const {name} = parseFoodQuery(raw);
  const q = normalizeText(name || raw);
  if(!q) return [];
  return FOOD_DB
    .map((f,i)=>({f,i,s:scoreMatch(f.name,q)}))
    .filter(x=>x.s>=70)
    .sort((a,b)=>b.s-a.s)
    .slice(0,5);
}

/* ---------- ring gauge ---------- */
function ring(value, goal, color, size, label, unit){
  const pct = goal>0 ? Math.min(100,(value/goal)*100) : 0;
  const over = goal>0 && value>goal;
  const c = over ? 'var(--danger)' : color;
  return `
  <div class="col" style="align-items:center;gap:8px;">
    <div class="ring" style="width:${size}px;height:${size}px;background:conic-gradient(${c} ${pct*3.6}deg, var(--surface2) 0deg);">
      <div class="ring-inner">
        <span class="mono" style="font-size:${size>=110?19:16}px;font-weight:700;color:${over?'var(--danger)':'var(--text)'};">${Math.round(value)}</span>
        <span class="mono" style="font-size:10px;color:var(--muted);">/${goal}${unit}</span>
      </div>
    </div>
    <span class="disp" style="font-size:13px;font-weight:600;color:${color};text-transform:uppercase;">${label}</span>
  </div>`;
}

function deltaHtml(curr, prev, invert){
  if(prev===undefined||prev===null||curr===undefined||curr===null) return '';
  const diff = +(curr-prev).toFixed(1);
  if(diff===0) return `<span class="mono" style="color:var(--muted);font-size:11px;">— 0</span>`;
  const good = invert ? diff<0 : diff>0;
  const color = good ? 'var(--energy)' : 'var(--danger)';
  const arrow = diff>0 ? '↑' : '↓';
  return `<span class="mono" style="color:${color};font-size:11px;">${arrow} ${Math.abs(diff)}</span>`;
}

/* ---------- simple svg line chart ---------- */
function lineChart(data, key, color, unit){
  const filtered = data.filter(d => d[key]!==undefined && d[key]!==null && d[key]!=='');
  if(filtered.length<2){
    return `<p class="empty">Necesitas al menos 2 registros con ${key} para graficar.</p>`;
  }
  const w=560,h=200,pad=36;
  const values = filtered.map(d=>Number(d[key]));
  let min=Math.min(...values), max=Math.max(...values);
  if(min===max){ min-=1; max+=1; }
  const n=filtered.length;
  const xStep = n>1 ? (w-2*pad)/(n-1) : 0;
  const pts = filtered.map((d,i)=>{
    const x = pad + i*xStep;
    const y = h-pad - ((Number(d[key])-min)/(max-min))*(h-2*pad);
    return {x,y,v:d[key],date:d.date};
  });
  const poly = pts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dots = pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3.2" fill="${color}"/>`).join('');
  const first = filtered[0], last = filtered[filtered.length-1];
  return `
  <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="var(--border)" stroke-width="1"/>
    <text x="${pad}" y="${pad-8}" fill="var(--muted)" font-size="10">${max}${unit}</text>

function computeTotals(date){
  const entries = state.foodLog[date] || [];
  return entries.reduce((a,e)=>({
    cal:a.cal+Number(e.cal||0), protein:a.protein+Number(e.protein||0),
    carb:a.carb+Number(e.carb||0), fat:a.fat+Number(e.fat||0),
  }),{cal:0,protein:0,carb:0,fat:0});
}
function waterTotal(date){
  return (state.waterLog[date]||[]).reduce((s,e)=>s+Number(e.ml||0),0);
}
function waterCount(date, ml){
  return (state.waterLog[date]||[]).filter(e=>e.ml===ml).length;
}

/* ---------- misc ---------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function handlePhotoFile(file){
  if(!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxDim = 360;
      let w = img.width, h = img.height;
      if(w>h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h>=w && h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      state.photo = dataUrl;
      save('vc_photo', dataUrl);
      renderApp();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

  ],

function pickN(arr, n, seed){
  const out=[]; const used={};
  for(let i=0;i<n && i<arr.length;i++){
    let idx=(seed+i*7)%arr.length;
    while(used[idx]) idx=(idx+1)%arr.length;
    used[idx]=1; out.push(arr[idx]);
  }
  return out;
}

function updateFoodAssist(){
  const nameInput = document.getElementById('f_name');
  const suggestEl = document.getElementById('f_suggest');
  const hintEl = document.getElementById('f_hint');
  if(!nameInput) return;
  const raw = nameInput.value;

  if(!raw.trim()){
    suggestEl.innerHTML = '';
    hintEl.innerHTML = '';
    return;
  }

  const {name, qty, unitToken} = parseFoodQuery(raw);
  const food = findFood(name || raw);

  if(food){
    const {grams, label} = resolveGrams(food, qty, unitToken);
    const factor = grams/100;
    document.getElementById('f_cal').value = Math.round(food.kcal*factor);
    document.getElementById('f_protein').value = +(food.protein*factor).toFixed(1);
    document.getElementById('f_carb').value = +(food.carb*factor).toFixed(1);
    document.getElementById('f_fat').value = +(food.fat*factor).toFixed(1);
    hintEl.innerHTML = `<span class="hint-ok">✓ ${food.name} · ${label} → macros calculados (puedes editarlos)</span>`;
  } else {
    hintEl.innerHTML = `<span class="hint-none">No está en la base de datos — captura los macros manualmente</span>`;
  }

  const suggestions = getSuggestions(raw);
  if(suggestions.length && !food){
    suggestEl.innerHTML = `<div class="suggest-box">${suggestions.map(s=>`
      <div class="suggest-item" data-action="pickFood" data-idx="${s.i}">
        <span>${s.f.name}</span>
        <span class="mono muted">${s.f.kcal} kcal/100g</span>
      </div>`).join('')}</div>`;
  } else {
    suggestEl.innerHTML = '';
  }
}

    }
    foodForm.addEventListener('submit', (e)=>{
      e.preventDefault();
      const name = document.getElementById('f_name').value.trim();
      const cal = document.getElementById('f_cal').value;

      const entry = {

      list.push(entry);
      state.foodLog[state.selDate] = list;
      saveFoodLog();
      renderApp();

/* ---------- delegated click actions ---------- */
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;

  if(action==='setTab'){ state.tab = btn.dataset.tab; renderApp(); }
  else if(action==='prevDay'){ state.selDate = addDays(state.selDate,-1); renderApp(); }
  else if(action==='nextDay'){ state.selDate = addDays(state.selDate,1); renderApp(); }
  else if(action==='goToday'){ state.selDate = todayStr(); renderApp(); }
  else if(action==='delFood'){
    const id = btn.dataset.id;
    state.foodLog[state.selDate] = (state.foodLog[state.selDate]||[]).filter(x=>x.id!==id);
    saveFoodLog(); renderApp();
  }
  else if(action==='delMeas'){
    const id = btn.dataset.id;
    state.measurements = state.measurements.filter(x=>x.id!==id);
    saveMeasurements(); renderApp();
  }
  else if(action==='delWater'){
    const id = btn.dataset.id;
    state.waterLog[state.selDate] = (state.waterLog[state.selDate]||[]).filter(x=>x.id!==id);
    saveWaterLog(); renderApp();
  }
  else if(action==='delNote'){
    const id = btn.dataset.id;
    state.notes[state.selDate] = (state.notes[state.selDate]||[]).filter(x=>x.id!==id);
    saveNotes(); renderApp();
  }
  else if(action==='addExercise'){
    const idx = Number(document.getElementById('ex_act').value);
    const min = Number(document.getElementById('ex_min').value);
    const w = Number(document.getElementById('ex_weight').value) || 70;
    if(!min || min<=0) return;
    const act = ACTIVITIES[idx];
    const kcal = exerciseKcal(act.met, w, min);
    const list = state.exerciseLog[state.selDate] ? state.exerciseLog[state.selDate].slice() : [];
    list.push({ id: uid(), name: act.n, min: min, kcal: kcal, t: Date.now() });
    state.exerciseLog[state.selDate] = list;
    saveExercise(); renderApp();
  }
  else if(action==='delExercise'){
    const id = btn.dataset.id;
    state.exerciseLog[state.selDate] = (state.exerciseLog[state.selDate]||[]).filter(x=>x.id!==id);
    saveExercise(); renderApp();
  }
  else if(action==='pickFood'){
    const idx = Number(btn.dataset.idx);
    const food = FOOD_DB[idx];
    if(!food) return;
    const nameInput = document.getElementById('f_name');
    const {qty, unitToken} = parseFoodQuery(nameInput.value);
    const isGramUnit = unitToken && /^(g|gr|gramos)$/i.test(unitToken);
    let suffix;
    if(qty==null) suffix = food.unitGrams ? '1 pieza' : '100g';
    else if(isGramUnit || !food.unitGrams) suffix = `${qty}g`;
    else suffix = `${qty} piezas`;
    nameInput.value = `${food.name} ${suffix}`;
    updateFoodAssist();
    document.getElementById('f_suggest').innerHTML = '';
    nameInput.focus();
  }
  else if(action==='togglePkgCalc'){
    pkgCalcOpen = !pkgCalcOpen;
    renderApp();
  }
  else if(action==='applyPkgCalc'){
    const total = Number(document.getElementById('pk_total').value);
    const eaten = Number(document.getElementById('pk_eaten').value);
    const cal = Number(document.getElementById('pk_cal').value)||0;
    const protein = Number(document.getElementById('pk_protein').value)||0;
    const carb = Number(document.getElementById('pk_carb').value)||0;
    const fat = Number(document.getElementById('pk_fat').value)||0;
    const resultEl = document.getElementById('pk_result');
    if(!total || total<=0){
      resultEl.innerHTML = `<span class="hint-none">Captura el peso total del paquete.</span>`;
      return;
    }
    if(!eaten || eaten<=0){
      resultEl.innerHTML = `<span class="hint-none">Captura cuánto comiste.</span>`;
      return;
    }
    const factor = eaten/total;
    const rCal = Math.round(cal*factor);
    const rProtein = +(protein*factor).toFixed(1);
    const rCarb = +(carb*factor).toFixed(1);
    const rFat = +(fat*factor).toFixed(1);
    document.getElementById('f_cal').value = rCal;
    document.getElementById('f_protein').value = rProtein;
    document.getElementById('f_carb').value = rCarb;
    document.getElementById('f_fat').value = rFat;
    const nameInput = document.getElementById('f_name');
    if(!nameInput.value.trim()) nameInput.value = `Porción de paquete ${eaten}g`;
    document.getElementById('f_hint').innerHTML = `<span class="hint-ok">✓ Calculado desde el paquete</span>`;
    resultEl.innerHTML = `<span class="mono" style="color:var(--energy);font-size:11px;">
      Comiste ${eaten}g de ${total}g (${(factor*100).toFixed(1)}%) → ${rCal} kcal · P ${rProtein}g · C ${rCarb}g · G ${rFat}g — ya se llenó el formulario de arriba.
    </span>`;
  }
  else if(action==='waterPlus'){
    const ml = Number(btn.dataset.ml);
    const list = state.waterLog[state.selDate] ? state.waterLog[state.selDate].slice() : [];
    list.push({id:uid(), ml, t:Date.now()});
    state.waterLog[state.selDate] = list;
    saveWaterLog(); renderApp();
  }
  else if(action==='waterMinus'){
    const ml = Number(btn.dataset.ml);
    const list = (state.waterLog[state.selDate]||[]).slice();
    for(let i=list.length-1;i>=0;i--){
      if(list[i].ml===ml){ list.splice(i,1); break; }
    }
    state.waterLog[state.selDate] = list;
    saveWaterLog(); renderApp();
  }
  else if(action==='waterCustom'){
    const input = document.getElementById('w_custom');
    const ml = Number(input.value);
    if(!ml || ml<=0) return;
    const list = state.waterLog[state.selDate] ? state.waterLog[state.selDate].slice() : [];
    list.push({id:uid(), ml, t:Date.now()});
    state.waterLog[state.selDate] = list;
    saveWaterLog(); renderApp();
  }
  else if(action==='applyCalc'){
    const w = Number(document.getElementById('c_weight').value);
    const h = Number(document.getElementById('c_height').value);
    const a = Number(document.getElementById('c_age').value);
    const sex = document.getElementById('c_sex').value;
    const activity = Number(document.getElementById('c_activity').value);
    const goal = document.getElementById('c_goal').value;
    if(!w || !h || !a) return;
    let bmr = sex==='m' ? (10*w + 6.25*h - 5*a + 5) : (10*w + 6.25*h - 5*a - 161);
    let tdee = bmr*activity;
    if(goal==='deficit') tdee -= 500;
    if(goal==='superavit') tdee += 300;
    const protein = Math.round(w*1.8);
    const fat = Math.round((tdee*0.25)/9);
    const carb = Math.max(Math.round((tdee - protein*4 - fat*9)/4), 0);
    const water = Math.round(w*35);
    state.profile = {...state.profile, calGoal:Math.round(tdee), proteinGoal:protein, carbGoal:carb, fatGoal:fat, waterGoal:water};
    saveProfile();
    renderApp();
  }
  else if(action==='resetAll'){
    if(confirm('¿Seguro que quieres borrar TODOS tus datos (comida, agua, medidas, notas, foto y metas)? Esta acción no se puede deshacer.')){
      localStorage.removeItem('vc_profile');
      localStorage.removeItem('vc_foodlog');
      localStorage.removeItem('vc_waterlog');
      localStorage.removeItem('vc_measurements');
      localStorage.removeItem('vc_notes');
      localStorage.removeItem('vc_photo');
      state.profile = {calGoal:2000, proteinGoal:150, carbGoal:210, fatGoal:60, waterGoal:2000, name:'', height:null};
      state.foodLog = {}; state.waterLog = {}; state.measurements = []; state.notes = {}; state.photo = null;
      renderApp();
    }
  }
  else if(action==='removePhoto'){
    state.photo = null;
    localStorage.removeItem('vc_photo');
    renderApp();
  }
});

renderApp();
</script>
</body>
</html>
